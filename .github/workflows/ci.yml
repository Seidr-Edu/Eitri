name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

# Drop redundant runs when new commits land on the same branch (saves time and queue).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: zulu
          cache: maven
      - name: Build and test
        # -ntp: less log I/O; -T 1C: parallel build (helps a bit even for single-module projects)
        run: mvn -B -ntp -T 1C verify
